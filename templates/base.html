<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Comparative AQI Prediction & Forecasting{% endblock %}</title>
    
    <!-- Meta tags for SEO -->
    <meta name="description" content="Comparative Analysis of Air Quality Prediction using Regression and Deep Learning Techniques. Renders preprocessing, EDA, model evaluation, real-time prediction, city comparisons, and LSTM forecasting.">
    <meta name="author" content="Final Year Project Group">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    {% block head_extra %}{% endblock %}
</head>
<body>

    <!-- Sticky Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-custom navbar-light">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <i class="bi bi-wind text-primary"></i>
                <span>AQI</span>Predict
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' or request.path == '/dashboard' %}active{% endif %}" id="nav-dashboard" href="{{ url_for('home') }}">EDA & Preprocessing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/comparison' %}active{% endif %}" id="nav-comparison" href="{{ url_for('comparison') }}">Model Evaluation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/predict' %}active{% endif %}" id="nav-predict" href="{{ url_for('predict_page') }}">Real-Time Predictor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/forecast' %}active{% endif %}" id="nav-forecast" href="{{ url_for('forecast_page') }}">LSTM Forecast</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/city-comparison' %}active{% endif %}" id="nav-cities" href="{{ url_for('city_comparison_page') }}">City Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer-custom py-3 text-center border-top">
        <div class="container">
            <p class="mb-0 text-muted">&copy; 2026 AQI Predict. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
